<!DOCTYPE html>
<html lang="en">

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HSE Site Finder</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="container">


<h1>HSE Site Finder</h1>

<p>
Find RAMS documents for your site
</p>



<input 
id="searchBox"
type="text"
placeholder="Enter postcode or address"
autocomplete="off"
>



<div id="suggestions"></div>



<button onclick="manualSearch()">
🔍 Search
</button>



<button class="location" onclick="getLocation()">
📍 Use My Location
</button>



<div id="result"></div>


</div>



<script src="script.js"></script>

</body>

</html>
