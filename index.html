<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HSE RAMS Finder</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>HSE RAMS Finder</h1>

<div id="result"></div>


<div class="manual">

<input 
id="searchBox"
placeholder="Enter postcode or address"
style="display:none;">


<button id="manualButton" onclick="showManualSearch()">
Open RAMS Manually
</button>


<button id="locationButton" onclick="getLocation()">
Open RAMS by Location
</button>


<button id="searchButton" onclick="manualSearch()" style="display:none;">
Search RAMS
</button>


</div>


</div>


<script src="script.js"></script>


</body>

</html>
